server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/mbti
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt:
  secret: mbti-api-secret-key-2026-spring-boot-backend-jwt-signing-key
  expiration: 86400000  # 24 hours in milliseconds
